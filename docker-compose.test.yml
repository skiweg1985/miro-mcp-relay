# Test stack: Keycloak with imported realm `broker-test` (users + OIDC clients).
# Start: docker compose -f docker-compose.test.yml up -d
# Admin console: http://localhost:8180/  (see KEYCLOAK_ADMIN_* below)
#
# Run broker against it: copy .env.test.example → .env.test, then e.g.
#   export $(grep -v '^#' .env.test | xargs) && cd backend && uvicorn app.main:app --reload --port 8000

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm --http-port=8180 --hostname-strict=false
    ports:
      - "8180:8180"
    environment:
      KEYCLOAK_ADMIN: broker-test-admin
      KEYCLOAK_ADMIN_PASSWORD: broker-test-admin-change-me
    volumes:
      - ./testing/keycloak/import:/opt/keycloak/data/import
