services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: broker
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  broker-backend:
    build:
      context: ./backend
    container_name: oauth-broker-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://broker:broker@postgres:5432/broker
      CORS_ORIGINS: http://localhost:5173,http://localhost:8787
      BROKER_PUBLIC_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:5173
      LEGACY_MIRO_DATA_DIR: /legacy-data
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_PASSWORD: change-me-admin-password
      SESSION_SECRET: change-me-broker-session-secret
    ports:
      - "8000:8000"
    volumes:
      - ./data:/legacy-data
    depends_on:
      - postgres
    restart: unless-stopped

  miro-mcp-relay:
    build: .
    container_name: miro-mcp-relay
    env_file:
      - .env
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
