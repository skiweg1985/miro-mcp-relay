services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: broker
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker -d broker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  haproxy:
    build:
      context: ./haproxy
    container_name: oauth-broker-proxy
    depends_on:
      - broker-frontend
      - broker-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devcert:/certs
    restart: unless-stopped

  broker-frontend:
    build:
      context: ./frontend
    container_name: oauth-broker-frontend
    restart: unless-stopped

  broker-backend:
    build:
      context: ./backend
    container_name: oauth-broker-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://broker:broker@postgres:5432/broker
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      BROKER_PUBLIC_BASE_URL: ${BROKER_PUBLIC_BASE_URL:-http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      LEGACY_MIRO_DATA_DIR: /legacy-data
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-admin-password}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-broker-session-secret}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
