global
  log stdout format raw local0
  maxconn 2048

defaults
  log global
  mode http
  option httplog
  option dontlognull
  option forwardfor
  timeout connect 5s
  timeout client 60s
  timeout server 60s
  timeout tunnel 1h

frontend fe_http
  bind *:80
  bind *:443 ssl crt /certs/localhost.pem
  http-request set-header X-Forwarded-Proto https if { ssl_fc }
  http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
  http-request set-header X-Forwarded-Host %[req.hdr(Host)]

  acl is_api path_beg /api/
  acl is_api_root path -i /api
  acl is_miro path_beg /miro
  acl is_miro_start path -i /start
  acl is_relay_health path -i /healthz /readyz

  use_backend be_broker_backend if is_api or is_api_root
  use_backend be_miro_relay if is_miro or is_miro_start or is_relay_health
  default_backend be_broker_frontend

backend be_broker_backend
  option httpchk GET /api/v1/health
  server broker-backend broker-backend:8000 check

backend be_miro_relay
  option httpchk GET /healthz
  server miro-mcp-relay miro-mcp-relay:8787 check

backend be_broker_frontend
  option httpchk GET /
  server broker-frontend broker-frontend:80 check
